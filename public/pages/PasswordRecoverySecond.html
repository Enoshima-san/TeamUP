<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="stylesheet" href="../styles/PRStyles.css">
    <meta charset="UTF-8">
    <title>TeamUp</title>
</head>
<body>
    <div class="container">
        <h1>TeamUP</h1>
        <p>Восстановление пароля</p>
        <form id="PRSecond">
            <label for="password">Новый пароль:</label>
            <input type="password" id="password" minlength="6" placeholder="Введите новый пароль" />
            <br><br>
            <label for="password">Подтверждение пароля:</label>
            <input type="password" id="password" minlength="6" placeholder="Введите новый пароль повторно" />
            <br><br>
            <button type="submit">Сохранить</button>
        </form>
    </div>
</body>
</html>
